name: Update News

on:
  schedule:
    # Runs at 6:00 AM UTC every day (adjust to your timezone)
    # 6 AM UTC = 1 AM EST / 11 PM PST / 8 AM CET
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows you to trigger manually from GitHub Actions tab

permissions:
  contents: write   # needed to commit updated index.html

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install feedparser
        run: pip install feedparser

      - name: Fetch news and update index.html
        run: python fetch_news.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "News Bot"
          git config user.email "news-bot@users.noreply.github.com"
          git add index.html
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "📰 Update news $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
